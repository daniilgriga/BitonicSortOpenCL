name: CI

on:
  push:
    branches: [dev, main, "feat/**", "chore/**", "fix/**"]
  pull_request:
    branches: [dev, main]

jobs:
  ubuntu-debug:
    name: Ubuntu (GCC Debug)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build g++ \
            libcli11-dev \
            libgtest-dev \
            opencl-headers ocl-icd-opencl-dev pocl-opencl-icd

      - name: Configure
        run: cmake -S . -B build/debug -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build/debug

      - name: Run tests
        run: ctest --test-dir build/debug --output-on-failure

      - name: Run E2E tests
        run: ./tests/e2e/run_all.sh ./build/debug/bitonic_sort

  ubuntu-sanitize:
    name: Ubuntu (GCC + Sanitizers)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build g++ \
            libcli11-dev \
            libgtest-dev \
            opencl-headers ocl-icd-opencl-dev pocl-opencl-icd

      - name: Configure
        run: cmake -S . -B build/sanitize -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON -DSANITIZE=ON

      - name: Build
        run: cmake --build build/sanitize

      - name: Run tests
        env:
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/.github/lsan.supp:print_suppressions=0
        run: ctest --test-dir build/sanitize --output-on-failure

  ubuntu-release:
    name: Ubuntu (GCC Release)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build g++ \
            libcli11-dev \
            opencl-headers ocl-icd-opencl-dev pocl-opencl-icd

      - name: Configure
        run: cmake -S . -B build/release -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF -DSANITIZE=OFF

      - name: Build
        run: cmake --build build/release

      - name: Run E2E tests
        run: ./tests/e2e/run_all.sh ./build/release/bitonic_sort

  windows-debug:
    name: Windows (MSVC Debug)
    runs-on: windows-latest

    env:
      PROJECT_VCPKG_ROOT: ${{ github.workspace }}/vcpkg

    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies (vcpkg)
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:PROJECT_VCPKG_ROOT"
          & "$env:PROJECT_VCPKG_ROOT/bootstrap-vcpkg.bat"
          & "$env:PROJECT_VCPKG_ROOT/vcpkg.exe" install gtest:x64-windows opencl:x64-windows cli11:x64-windows

      - name: Configure
        run: cmake -S . -B build/debug -G "Visual Studio 17 2022" -A x64 -DBUILD_TESTS=ON -DCMAKE_TOOLCHAIN_FILE=${{ env.PROJECT_VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build/debug --config Debug

      - name: Run tests
        run: ctest --test-dir build/debug -C Debug --output-on-failure

      - name: CLI smoke test
        shell: pwsh
        run: .\build\debug\Debug\bitonic_sort.exe --help

  windows-sanitize:
    name: Windows (MSVC Sanitize config)
    runs-on: windows-latest

    env:
      PROJECT_VCPKG_ROOT: ${{ github.workspace }}/vcpkg

    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies (vcpkg)
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:PROJECT_VCPKG_ROOT"
          & "$env:PROJECT_VCPKG_ROOT/bootstrap-vcpkg.bat"
          & "$env:PROJECT_VCPKG_ROOT/vcpkg.exe" install gtest:x64-windows opencl:x64-windows cli11:x64-windows

      - name: Configure
        run: cmake -S . -B build/sanitize -G "Visual Studio 17 2022" -A x64 -DBUILD_TESTS=ON -DSANITIZE=ON -DCMAKE_TOOLCHAIN_FILE=${{ env.PROJECT_VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build/sanitize --config Debug

      - name: Run tests
        run: ctest --test-dir build/sanitize -C Debug --output-on-failure

      - name: CLI smoke test
        shell: pwsh
        run: .\build\sanitize\Debug\bitonic_sort.exe --help

  windows-release:
    name: Windows (MSVC Release)
    runs-on: windows-latest

    env:
      PROJECT_VCPKG_ROOT: ${{ github.workspace }}/vcpkg

    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies (vcpkg)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function Invoke-WithRetry {
            param(
              [scriptblock]$Action,
              [int]$MaxAttempts = 4,
              [int]$DelaySeconds = 20
            )

            for ($Attempt = 1; $Attempt -le $MaxAttempts; $Attempt++) {
              try {
                & $Action
                if ($LASTEXITCODE -ne 0) {
                  throw "Command exited with code $LASTEXITCODE"
                }
                return
              } catch {
                if ($Attempt -eq $MaxAttempts) {
                  throw
                }
                Write-Host "Attempt $Attempt failed. Retrying in $DelaySeconds seconds..."
                Start-Sleep -Seconds $DelaySeconds
              }
            }
          }

          git clone https://github.com/microsoft/vcpkg.git "$env:PROJECT_VCPKG_ROOT"
          Invoke-WithRetry { & "$env:PROJECT_VCPKG_ROOT/bootstrap-vcpkg.bat" -disableMetrics }
          Invoke-WithRetry { & "$env:PROJECT_VCPKG_ROOT/vcpkg.exe" install opencl:x64-windows cli11:x64-windows }

      - name: Configure
        run: cmake -S . -B build/release -G "Visual Studio 17 2022" -A x64 -DBUILD_TESTS=OFF -DSANITIZE=OFF -DCMAKE_TOOLCHAIN_FILE=${{ env.PROJECT_VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build/release --config Release

      - name: CLI smoke test
        shell: pwsh
        run: .\build\release\Release\bitonic_sort.exe --help
